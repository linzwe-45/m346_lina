#cloud-config
users:
  - name: ubuntu
    groups: [users, admin]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys: #LZ (Key= lina1) & PAT  
      - ssh-rsa  aws-key
      - ssh-rsa  aws-key

ssh_pwauth: false
disable_root: false
package_update: true
packages:
  - apache2
  - php
  - libapache2-mod-php
  - php-mysql
  - adminer

write_files:
  - path: /var/www/html/info.php
    permissions: '0644'
    content: |
      <?php
      // Show all information, defaults to INFO_ALL
      phpinfo();
      ?>

  - path: /var/www/html/db.php
    permissions: '0644'
    content: |
      <html>
      <head></head>
      <body>
      Diese Seite macht eine Abfrage auf die Datenbank. <br />
      Das ausgeführte Query ist: <i>select Host, User from mysql.user;</i><br /><br />
      Das Resultat: <br />
      <?php
              $servername = "172.31.64.10";
              $username = "admin";
              $password = "354";
              $dbname = "mysql";

              $conn = new mysqli($servername, $username, $password, $dbname);

              if ($conn->connect_error) {
                      die("Connection failed: " . $conn->connect_error);
              }

              $sql = "select Host, User from mysql.user;";
              $result = $conn->query($sql);

              while($row = $result->fetch_assoc()){
                      echo("<li>" . $row["Host"] . " / " . $row["User"] . "</li>");
              }
      ?>
      </body>
      </html>

runcmd:
  # Adminer Apache Config aktivieren
  - sudo a2enconf adminer

  # Apache neu starten
  - sudo systemctl restart apache2